services:
  # ============================================
  # FalkorDB - Graph Database
  # ============================================
  falkordb:
    image: falkordb/falkordb:latest
    container_name: allan-falkordb
    ports:
      - "6380:6379"
      - "3001:3000"    # FalkorDB Web UI
    volumes:
      - falkordb_data:/data
    environment:
      - FALKORDB_ARGS=--save 60 1 --loglevel warning
      - ENCRYPTION_KEY=b32ac80ae71182ef56f388bd4fe9e1dbf5e6ba03ea80be29959e70cd87a3ec84
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Ollama - Local LLM & Embedding Models
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: allan-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 8G
    restart: unless-stopped

  # ============================================
  # Ollama Model Initializer
  # Pull LLM (qwen2.5:7b-instruct) + Embedding (nomic-embed-text)
  # ============================================
  ollama-init:
    image: ollama/ollama:latest
    container_name: allan-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: >
      sh -c "
        echo '=== Pulling nomic-embed-text (embedding, ~270MB) ===' &&
        ollama pull nomic-embed-text &&
        echo '' &&
        echo '=== Pulling qwen2.5:7b-instruct (LLM, ~4.7GB) ===' &&
        ollama pull qwen2.5:7b-instruct &&
        echo '' &&
        echo '=== All models ready! ===' &&
        ollama list
      "
    restart: "no"

  # ============================================
  # Allan Memory - Knowledge Graph Service
  # ============================================
  allan-memory:
    build: .
    container_name: allan-memory
    ports:
      - "${PORT:-19089}:19089"
    depends_on:
      falkordb:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      # Server
      - PORT=19089
      - NODE_ENV=production
      
      # FalkorDB
      - FALKORDB_URI=redis://falkordb:6379
      - FALKORDB_GRAPH_NAME=allan_memory
      
      # LLM (Ollama - Full Offline)
      - LLM_API_URL=http://ollama:11434/v1
      - LLM_API_KEY=ollama
      - LLM_MODEL=qwen2.5:7b-instruct
      
      # Embedder (Ollama)
      - EMBEDDER_API_URL=http://ollama:11434/v1
      - EMBEDDER_API_KEY=ollama
      - EMBEDDER_MODEL=nomic-embed-text
      - EMBEDDER_DIMENSIONS=768
      
      # Memory settings
      - DEFAULT_GROUP_ID=main
      - SEMAPHORE_LIMIT=2
      
      # Logging
      - LOG_LEVEL=info
    deploy:
      resources:
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19089/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  falkordb_data:
  ollama_data:
