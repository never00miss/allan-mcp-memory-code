services:
  # ============================================
  # FalkorDB - Graph Database
  # ============================================
  falkordb:
    image: falkordb/falkordb:latest
    container_name: allan-falkordb
    ports:
      - "6380:6379"
      - "3001:3000"    # FalkorDB Web UI
    volumes:
      - falkordb_data:/data
    environment:
      - FALKORDB_ARGS=--save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Ollama - Local Embedding Model
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: allan-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Ollama Model Initializer
  # Pull nomic-embed-text model on startup
  # ============================================
  ollama-init:
    image: curlimages/curl:latest
    container_name: allan-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling nomic-embed-text model...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}' &&
        echo 'Model pulled successfully!'
      "
    restart: "no"

  # ============================================
  # Allan Memory - Knowledge Graph Service
  # ============================================
  allan-memory:
    build: .
    container_name: allan-memory
    ports:
      - "${PORT:-19089}:19089"
    depends_on:
      falkordb:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      # Server
      - PORT=19089
      - NODE_ENV=production
      
      # FalkorDB
      - FALKORDB_URI=redis://falkordb:6379
      - FALKORDB_GRAPH_NAME=allan_memory
      
      # LLM (OpenRouter / OpenAI Compatible)
      - LLM_API_URL=https://openrouter.ai/api/v1
      - LLM_API_KEY=${LLM_API_KEY:-your-openrouter-api-key}
      - LLM_MODEL=${LLM_MODEL:-qwen/qwen3-30b-a3b}
      
      # Embedder (Ollama in container)
      - EMBEDDER_API_URL=http://ollama:11434/v1
      - EMBEDDER_API_KEY=ollama
      - EMBEDDER_MODEL=nomic-embed-text
      - EMBEDDER_DIMENSIONS=768
      
      # Memory settings
      - DEFAULT_GROUP_ID=main
      - SEMAPHORE_LIMIT=2
      
      # Logging
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19089/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  falkordb_data:
  ollama_data:
